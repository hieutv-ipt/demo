---
- name: Webhook to Controller Workflow
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Launch workflow on webhook event
      condition: event.payload is defined
      action:
        run_workflow_template:
          name: "WF-demo-end-to-end"
          organization: "Default"
