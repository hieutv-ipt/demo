---
- name: Webhook trigger workflow
  hosts: localhost

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Trigger workflow
      condition: event.payload is defined
      action:
        run_workflow_template:
          name: WF-demo-end-to-end
          organization: Default
